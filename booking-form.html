<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Form</title>
  <style>
    body { font-family: sans-serif; background: #f8f8f8; }
    .form-container { max-width: 400px; margin: 2rem auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px #0001; }
    label { display: block; margin-top: 1rem; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: #0070ba; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #005fa3; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Booking / Inquiry Form</h2>
    <form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="e4c4edf6-6e35-456a-87da-b32b961b449a">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone">

      <label for="course_title">Course / Package</label>
      <input type="text" id="course_title" name="course_title">

      <label for="preferred_date">Preferred Date</label>
      <input type="date" id="preferred_date" name="preferred_date">

      <label for="experience_level">Experience Level</label>
      <select id="experience_level" name="experience_level">
        <option value="">Select...</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="professional">Professional</option>
      </select>

      <label for="message">Comments / Questions</label>
      <textarea id="message" name="message" rows="4" required></textarea>

      <button type="submit">Send Booking</button>
    </form>
  </div>
</body>
</html>
