<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking / Inquiry</title>
  <style>
    body { font-family: sans-serif; background: #f8f8f8; margin: 0; }
    .container { max-width: 700px; margin: 3rem auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px #0002; padding: 2rem; }
    h1 { text-align: center; color: #0070ba; margin-bottom: 2rem; }
    iframe { width: 100%; min-height: 1100px; border: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Booking / Inquiry Form</h1>
    <button class="book-now-btn" style="width:100%">Book Now / Inquiry</button>
    <!-- Modal Structure -->
    <div id="booking-modal" style="display:none;position:fixed;z-index:1000;left:0;top:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
      <div style="background:#fff;padding:2rem;border-radius:8px;max-width:400px;width:90%;position:relative;box-shadow:0 2px 16px #0003;">
        <button id="booking-modal-close" style="position:absolute;top:10px;right:10px;background:none;border:none;font-size:1.5rem;cursor:pointer;">&times;</button>
        <form action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="e4c4edf6-6e35-456a-87da-b32b961b449a">
          <input type="hidden" name="subject" value="New Booking Inquiry from Website">
          <input type="hidden" name="redirect" value="https://www.divinginasia.com/thank-you.html">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
          <label for="course_title">Course</label>
          <select id="course_title" name="course_title" required>
            <option value="">Select...</option>
            <option value="Open Water">Open Water</option>
            <option value="Advanced Open Water">Advanced Open Water</option>
            <option value="Rescue Diver">Rescue Diver</option>
            <option value="Divemaster">Divemaster</option>
            <option value="Fun Dive">Fun Dive</option>
          </select>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
          <label for="phone">Phone</label>
          <input type="text" id="phone" name="phone">
          <label for="accommodation_type">Accommodation Type</label>
          <select id="accommodation_type" name="accommodation_type">
            <option value="">Select...</option>
            <option value="standard">Standard Room</option>
            <option value="deluxe">Deluxe Room</option>
            <option value="suite">Suite</option>
            <option value="other">Other / Not sure</option>
          </select>
          <label for="arrival_date">Arrival Date</label>
          <input type="date" id="arrival_date" name="arrival_date">
          <label for="diving_experience">Diving Experience</label>
          <select id="diving_experience" name="diving_experience">
            <option value="">Select...</option>
            <option value="none">No diving experience</option>
            <option value="beginner">Beginner (1-10 dives)</option>
            <option value="intermediate">Intermediate (10-50 dives)</option>
            <option value="advanced">Advanced (50+ dives)</option>
            <option value="professional">Professional diver</option>
          </select>
          <label for="message">Comments / Questions</label>
          <textarea id="message" name="message" rows="3" placeholder="Let us know any special requests, questions, or details..."></textarea>
          <button type="submit">Submit Booking</button>
          <a href="https://buy.stripe.com/aFacN5bN2bP25si1a55os00" target="_blank" rel="noopener" style="display:block;width:100%;margin:1em auto 0 auto;text-align:center;background:#635bff;color:#fff;padding:0.9em 0;border-radius:4px;font-size:1.1em;text-decoration:none;font-weight:bold;">Pay with Card (Stripe)</a>
        </form>
      </div>
    </div>
  </div>
</body>
<script src="/public/booking-modal.js"></script>
</html>
